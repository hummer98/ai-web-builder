# Cloudflare Workers 設定（ゲストサイトごとに name を変更）
name = "guest-site-api"
main = "functions/api/index.ts"
compatibility_date = "2024-12-01"

# D1 データベースバインディング（デプロイ後に database_id を設定）
# [[d1_databases]]
# binding = "DB"
# database_name = "guest-site-db"
# database_id = ""

# R2 バケットバインディング（画像アップロード用、必要時に有効化）
# [[r2_buckets]]
# binding = "ASSETS"
# bucket_name = "ai-web-builder-assets"
